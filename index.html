    .alert { padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; }
    .alert-success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }

    .footer {

    .loading { display: none; text-align: center; padding: 20px; }

    .spinner {

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .button-group { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }

      <script>
        atOptions = {
          'key' : 'a1d87d510dd3708b16850372612f7599',

  <script>
    // ========================================
    // CONSTANTS
    // ========================================
    const CONFIG = {
      PAGE_SIZES: {
        A4: { width: 595, height: 842, orientation: "portrait" },
        A5: { width: 595, height: 420, orientation: "landscape" }
      },
      CNIC: {
        MM: { width: 99.5, height: 68 },
        get SIZE() {
          return {
            width: this.MM.width * 2.83465,
            height: this.MM.height * 2.83465
          };
        }
      },
      LAYOUT: {
        MARGIN: 10,
        SPACING: 10,
        COLUMNS: 2
      },
      ALERT_TIMEOUT: 5000
    };

    const ELEMENTS = {
      pageSize: document.getElementById("pageSize"),
      customerName: document.getElementById("customerName"),
      copies: document.getElementById("copies"),
      frontImage: document.getElementById("frontImage"),
      backImage: document.getElementById("backImage"),
      frontFileName: document.getElementById("frontFileName"),
      backFileName: document.getElementById("backFileName"),
      customerSection: document.getElementById("customerSection"),
      customerList: document.getElementById("customerList"),
      totalCustomers: document.getElementById("totalCustomers"),
      totalCopies: document.getElementById("totalCopies"),
      loading: document.getElementById("loading"),
      alertContainer: document.getElementById("alertContainer"),
      addCustomerBtn: document.getElementById("addCustomerBtn"),
      generatePDFBtn: document.getElementById("generatePDFBtn"),
      resetAllBtn: document.getElementById("resetAllBtn")
    };

    // ========================================
    // STATE MANAGEMENT
    // ========================================
    const state = {
      customers: [],
      customerCounter: 0,
      
      addCustomer(customer) {
        this.customers.push({ ...customer, id: ++this.customerCounter });
      },
      
      removeCustomer(id) {
        this.customers = this.customers.filter(c => c.id !== id);
      },
      
      clearAll() {
        this.customers = [];
        this.customerCounter = 0;
      },
      
      getTotalCopies() {
        return this.customers.reduce((sum, c) => sum + c.copies, 0);
      }
    };

    // ========================================
    // UTILITY FUNCTIONS
    // ========================================
    const utils = {
      showAlert(message, type = "success") {
        const alertDiv = document.createElement("div");
        alertDiv.className = `alert alert-${type}`;
        alertDiv.textContent = message;
        ELEMENTS.alertContainer.appendChild(alertDiv);
        setTimeout(() => alertDiv.remove(), CONFIG.ALERT_TIMEOUT);
      },

      async readFileAsDataURL(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => resolve(e.target.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      },

      toggleLoading(show) {
        ELEMENTS.loading.classList.toggle("active", show);
      },

      clearFormInputs() {
        ELEMENTS.customerName.value = "";
        ELEMENTS.copies.value = 1;
        ELEMENTS.frontImage.value = "";
        ELEMENTS.backImage.value = "";
        ELEMENTS.frontFileName.textContent = "";
        ELEMENTS.backFileName.textContent = "";
      }
    };

    // ========================================
    // UI HANDLERS
    // ========================================
    const ui = {
      updateFileDisplay(element, fileName) {
        element.textContent = `✓ ${fileName}`;
      },

      renderCustomerList() {
        const html = state.customers.map(customer => `
          <div class="customer-item">
            <div class="customer-info">
              <div class="customer-name">${customer.name}</div>
              <div class="customer-copies">${customer.copies} ${customer.copies === 1 ? "copy" : "copies"}</div>
            </div>
            <button class="btn btn-danger" data-customer-id="${customer.id}">🗑️ Remove</button>
          </div>
        `).join("");
        
        ELEMENTS.customerList.innerHTML = html;
        this.updateStats();
        this.toggleCustomerSection();
      },

      updateStats() {
        ELEMENTS.totalCustomers.textContent = state.customers.length;
        ELEMENTS.totalCopies.textContent = state.getTotalCopies();
      },

      toggleCustomerSection() {
        ELEMENTS.customerSection.style.display = state.customers.length ? "block" : "none";
      }
    };

    // ========================================
    // CUSTOMER MANAGEMENT
    // ========================================
    const customerManager = {
      async add() {
        const name = ELEMENTS.customerName.value.trim() || `Customer ${state.customerCounter + 1}`;
        const copies = parseInt(ELEMENTS.copies.value);
        const frontFile = ELEMENTS.frontImage.files[0];
        const backFile = ELEMENTS.backImage.files[0];

        if (!frontFile || !backFile) {
          utils.showAlert("❌ Please upload both images", "danger");
          return;
        }

        try {
          const [frontImage, backImage] = await Promise.all([
            utils.readFileAsDataURL(frontFile),
            utils.readFileAsDataURL(backFile)
          ]);

          state.addCustomer({ name, copies, frontImage, backImage });
          ui.renderCustomerList();
          utils.clearFormInputs();
          utils.showAlert(`✅ ${name} added successfully!`);
        } catch (error) {
          utils.showAlert("❌ Error reading images", "danger");
          console.error(error);
        }
      },

      remove(id) {
        state.removeCustomer(id);
        ui.renderCustomerList();
        utils.showAlert("Customer removed");
      },

      resetAll() {
        if (confirm("Reset all data?")) {
          state.clearAll();
          ui.renderCustomerList();
          utils.clearFormInputs();
          utils.showAlert("All data cleared");
        }
      }
    };

    // ========================================
    // PDF GENERATION
    // ========================================
    const pdfGenerator = {
      getJsPDF() {
        // Wait for library to load and try multiple access patterns
        const lib = window.jspdf || window.jsPDF;
        if (!lib) return null;
        
        // Try different ways the library might be exposed
        if (typeof lib === 'function') return lib;
        if (lib.jsPDF) return lib.jsPDF;
        return null;
      },

      async ensureJsPDFLoaded() {
        // Wait a bit for the script to fully load if needed
        let attempts = 0;
        while (attempts < 20) {
          const jsPDF = this.getJsPDF();
          if (jsPDF) return jsPDF;
          await new Promise(resolve => setTimeout(resolve, 100));
          attempts++;
        }
        throw new Error("jsPDF library failed to load. Please refresh the page.");
      },

      async createPDFInstance(pageConfig) {
        const jsPDF = await this.ensureJsPDFLoaded();

        return new jsPDF({
          orientation: pageConfig.orientation,
          unit: "pt",
          format: pageConfig.orientation === "landscape" 
            ? [pageConfig.height, pageConfig.width] 
            : [pageConfig.width, pageConfig.height]
        });
      },

      calculateLayout(pageConfig) {
        const cnicSize = CONFIG.CNIC.SIZE;
        const { COLUMNS, MARGIN, SPACING } = CONFIG.LAYOUT;
        
        const totalWidth = cnicSize.width * COLUMNS + SPACING * (COLUMNS - 1);
        const xMargin = (pageConfig.width - totalWidth) / 2;
        const availableHeight = pageConfig.height - 2 * MARGIN;
        const rows = Math.floor((availableHeight + SPACING) / (cnicSize.height + SPACING));
        const perPage = COLUMNS * rows;

        return { xMargin, perPage, cnicSize };
      },

      calculatePosition(index, layout) {
        const { COLUMNS, MARGIN, SPACING } = CONFIG.LAYOUT;
        const { xMargin, cnicSize } = layout;
        
        const row = Math.floor(index / COLUMNS);
        const col = index % COLUMNS;
        
        return {
          x: xMargin + col * (cnicSize.width + SPACING),
          y: MARGIN + row * (cnicSize.height + SPACING)
        };
      },

      addImageToPDF(pdf, image, position, cnicSize) {
        pdf.addImage(image, "JPEG", position.x, position.y, cnicSize.width, cnicSize.height);
      },

      duplicatePages(pdf) {
        const totalPages = pdf.internal.pages.length - 1;
        for (let i = 1; i <= totalPages; i++) {
          const pageData = pdf.internal.pages[i];
          pdf.addPage();
          pdf.internal.pages[pdf.internal.pages.length - 1] = pageData;
        }
      },

      async generate() {
        if (state.customers.length === 0) {
          utils.showAlert("❌ Add at least one customer", "danger");
          return;
        }

        utils.toggleLoading(true);

        try {
          const pageType = ELEMENTS.pageSize.value;
          const pageConfig = CONFIG.PAGE_SIZES[pageType];
          const pdf = await this.createPDFInstance(pageConfig);
          const layout = this.calculateLayout(pageConfig);

          let positionIndex = 0;

          for (const customer of state.customers) {
            for (let copyNum = 0; copyNum < customer.copies; copyNum++) {
              // Add front image
              if (positionIndex >= layout.perPage) {
                pdf.addPage();
                positionIndex = 0;
              }
              const frontPos = this.calculatePosition(positionIndex, layout);
              this.addImageToPDF(pdf, customer.frontImage, frontPos, layout.cnicSize);
              positionIndex++;

              // Add back image
              if (positionIndex >= layout.perPage) {
                pdf.addPage();
                positionIndex = 0;
              }
              const backPos = this.calculatePosition(positionIndex, layout);
              this.addImageToPDF(pdf, customer.backImage, backPos, layout.cnicSize);
              positionIndex++;
            }
          }

          this.duplicatePages(pdf);
          pdf.save("All_Customers_CNIC_Copies.pdf");
          utils.showAlert("✅ PDF generated successfully (2 pages)!");
        } catch (error) {
          console.error("PDF Generation Error:", error);
          utils.showAlert(`❌ Error: ${error.message}`, "danger");
        } finally {
          utils.toggleLoading(false);
        }
      }
    };

    // ========================================
    // EVENT LISTENERS
    // ========================================
    function initEventListeners() {
      ELEMENTS.frontImage.addEventListener("change", (e) => {
        if (e.target.files[0]) {
          ui.updateFileDisplay(ELEMENTS.frontFileName, e.target.files[0].name);
        }
      });

      ELEMENTS.backImage.addEventListener("change", (e) => {
        if (e.target.files[0]) {
          ui.updateFileDisplay(ELEMENTS.backFileName, e.target.files[0].name);
        }
      });

      ELEMENTS.addCustomerBtn.addEventListener("click", () => {
        customerManager.add();
      });

      ELEMENTS.generatePDFBtn.addEventListener("click", () => {
        pdfGenerator.generate();
      });

      ELEMENTS.resetAllBtn.addEventListener("click", () => {
        customerManager.resetAll();
      });

      ELEMENTS.customerList.addEventListener("click", (e) => {
        if (e.target.closest(".btn-danger")) {
          const id = parseInt(e.target.closest(".btn-danger").dataset.customerId);
          customerManager.remove(id);
        }
      });
    }

    // ========================================
    // INITIALIZATION
    // ========================================
    initEventListeners();
  </script>
